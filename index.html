<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Anytime</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">☁️</span>
        <div>
          <h1>Weather Anytime</h1>
            <p class="tagline">Your local weather, anywhere</p>
        </div>
      </div>
      <div class="mode-control">
        <button id="unit-toggle" aria-label="toggle unit">°C</button>
        <button id="theme-toggle" aria-label="toggle theme">☾</button>
      </div>
    </aside>

    <main class="dashboard">
      <section class="lookup">
        <div class="search-box">
          <input id="city-input" placeholder="Search city..." autocomplete="off" />
          <button id="search-btn">Search</button>
          <button id="location-btn" title="Use current location">📍</button>
        </div>
        <div id="loading" class="loading hidden">Fetching weather...</div>
        <p id="error" class="error hidden"></p>
      </section>

      <section id="weather-display" class="weather-panel hidden">
        <div class="header-row">
          <div>
            <span class="subtle">CURRENT LOCATION</span>
            <h2 id="city-name">--</h2>
          </div>
          <div id="weather-icon-wrap" class="weather-icon-wrap">
            <img id="weather-icon" src="" alt="" />
          </div>
        </div>

        <div class="current-state">
          <div class="big-temp" id="temperature">--</div>
          <div class="small-text" id="description">--</div>
        </div>

        <div class="horizon">
          <div class="stat">
            <span>Humidity</span>
            <strong id="humidity">--</strong>
          </div>
          <div class="stat">
            <span>Feels Like</span>
            <strong id="feels-like">--</strong>
          </div>
          <div class="stat">
            <span>Pressure</span>
            <strong id="pressure">--</strong>
          </div>
        </div>
      </section>

      <section class="forecast-panel">
        <header class="panel-title">
          <h3>5-Day Forecast</h3>
        </header>
        <div id="forecast-cards" class="forecast-cards"></div>
      </section>

      <section id="search-history" class="history-panel hidden">
        <h4>Recent Search</h4>
        <ul id="history-list"></ul>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
